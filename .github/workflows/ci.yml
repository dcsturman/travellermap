# CI for the Rust rewrite (the C#/JS reference tree is not built here — see
# CLAUDE.md). Two parallel jobs:
#   - native: clippy + tests for the host crates (tmap-core, tmap-backend).
#   - wasm:   clippy (deny-warnings) the Leptos frontend for wasm32 (it's wasm-only,
#             so a bare `cargo test` skips it — clippy compiles + lints, the gate).
#
# Triggered only when Rust code, the manifests, the res/ data (the backend's
# system of record — the all-sectors test parses it), or this file changes.
name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'res/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'res/**'
      - '.github/workflows/ci.yml'

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: clippy + test (core + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Formatting is target-independent, so the whole workspace (incl. the
      # wasm frontend) is checked once here.
      - name: Format (check)
        run: cargo fmt --all -- --check
      # default-members is core + backend, so the bare invocations target the
      # native crates; the frontend (wasm-only) is checked in the wasm job.
      - name: Clippy (deny warnings)
        run: cargo clippy -p tmap-core -p tmap-backend -- -D warnings
      # TMAP_SKIP_PARITY excludes the compat suite's live travellermap.com
      # comparisons — they run on a local `cargo test` but are network-dependent
      # (slow/rate-limited/offline-hostile), so CI runs only the offline goldens.
      - name: Test
        run: cargo test --locked
        env:
          TMAP_SKIP_PARITY: "1"

  wasm:
    name: clippy frontend (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lint both feature sets: the default (what a contributor builds) and
      # `callisto` (what ships — the worldgen popups). Neither must rot. clippy
      # compiles too, so this also serves as the wasm build check.
      - name: Clippy (default, deny warnings)
        run: cargo clippy -p tmap-frontend --target wasm32-unknown-unknown -- -D warnings
      - name: Clippy (callisto, deny warnings)
        run: cargo clippy -p tmap-frontend --target wasm32-unknown-unknown --features callisto -- -D warnings
