<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the map fill the whole screen on notched
         iPhones; the map canvas uses dynamic viewport units (dvh) so it tracks
         Safari's show/hide toolbar instead of being clipped by it. -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Traveller Map</title>
    <!-- Trunk compiles this crate to wasm and injects the loader.
         data-wasm-opt="3" optimizes the release bundle for *speed* (this is the
         build we profile/ship). Use "z" instead if download size dominates. -->
    <link data-trunk rel="rust" data-wasm-opt="3" />
  </head>
  <body></body>
</html>
